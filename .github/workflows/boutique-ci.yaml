name: Boutique Shift-Left Security CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'src/online-boutique/**'
      - '.github/workflows/boutique-ci.yaml'

permissions:
  contents: write
  id-token: write # Required for Workload Identity Federation & Cosign

env:
  PROJECT_ID: "project-68d4f10e-27fc-4ab1-ab5"
  GAR_LOCATION: "asia-south1"
  REPOSITORY: "gke-apps-repo"
  WORKLOAD_IDENTITY_PROVIDER: "projects/128862263389/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
  SERVICE_ACCOUNT: "github-actions-sa@project-68d4f10e-27fc-4ab1-ab5.iam.gserviceaccount.com"

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [adservice, cartservice, checkoutservice, currencyservice, emailservice, frontend, loadgenerator, paymentservice, productcatalogservice, recommendationservice, shippingservice, shoppingassistantservice]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Build Directory
        run: |
          DIR="src/online-boutique/${{ matrix.service }}"
          if [ -f "$DIR/src/Dockerfile" ]; then
            DIR="$DIR/src"
          fi
          echo "BUILD_DIR=$DIR" >> $GITHUB_ENV

      - name: Run Trivy SAST (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '${{ env.BUILD_DIR }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build Docker Image
        run: |
          IMAGE_NAME="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}"
          docker build -t $IMAGE_NAME ${{ env.BUILD_DIR }}
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: docker push ${{ env.IMAGE_NAME }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign Container Image
        run: cosign sign --yes ${{ env.IMAGE_NAME }}

      - name: Generate and Attach SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft ${{ env.IMAGE_NAME }} -o spdx-json=sbom-${{ matrix.service }}.spdx.json
          cosign attach sbom --sbom sbom-${{ matrix.service }}.spdx.json ${{ env.IMAGE_NAME }}
          cosign sign --yes --attachment sbom ${{ env.IMAGE_NAME }}

  update-gitops:
    needs: build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm Values with New Image Tags
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" gitops/workloads/helm/online-boutique/online-boutique/values.yaml
          
      - name: Commit and Push Changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add gitops/workloads/helm/online-boutique/online-boutique/values.yaml
          git commit -m "chore(cd): update online-boutique image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
