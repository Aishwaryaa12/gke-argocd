apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: grafana-healthcheck-policy
  namespace: monitoring
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /api/health
        port: 3000
  targetRef:
    group: ""
    kind: Service
    name: kube-prometheus-stack-grafana
