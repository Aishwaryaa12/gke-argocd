apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-drop-capabilities
spec:
  validationFailureAction: Enforce
  rules:
    - name: drop-all-capabilities
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - security
              - monitoring
              - cert-manager
              - cnpg-system
              - database
              - external-secrets
      validate:
        message: "Containers must drop ALL capabilities."
        pattern:
          spec:
            =(ephemeralContainers):
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
            =(initContainers):
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
