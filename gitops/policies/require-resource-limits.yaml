apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
spec:
  validationFailureAction: Enforce
  rules:
    - name: validate-resources
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - security
              - monitoring
              - cert-manager
              - cnpg-system
              - database
              - external-secrets
      validate:
        message: "CPU and memory limits are required."
        pattern:
          spec:
            =(ephemeralContainers):
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
            =(initContainers):
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
