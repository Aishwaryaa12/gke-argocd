apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce
  rules:
    - name: require-image-tag
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - cert-manager
              - monitoring
              - cnpg-system
              - external-secrets
              - gmp-system
      validate:
        message: "Using the :latest image tag is not allowed."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
