apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce
  rules:
    - name: require-image-tag
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - security
              - monitoring
              - cert-manager
              - cnpg-system
              - database
      validate:
        message: "Using the :latest image tag is not allowed."
        pattern:
          spec:
            =(ephemeralContainers):
              - image: "!*:latest"
            =(initContainers):
              - image: "!*:latest"
            containers:
              - image: "!*:latest"
    - name: require-image-tag-separator
      match:
        any:
        - resources:
            kinds:
              - Pod
      exclude:
        any:
        - resources:
            namespaces:
              - kube-system
              - argocd
              - security
              - monitoring
              - cert-manager
              - cnpg-system
              - database
      validate:
        message: "An image tag is required."
        pattern:
          spec:
            =(ephemeralContainers):
              - image: "*:*"
            =(initContainers):
              - image: "*:*"
            containers:
              - image: "*:*"
