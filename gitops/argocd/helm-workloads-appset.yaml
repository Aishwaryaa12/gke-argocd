apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-workloads
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: git@github.com:Aishwaryaa12/gke-argocd.git
        revision: HEAD
        directories:
          - path: gitops/workloads/helm/*/*
  template:
    metadata:
      name: '{{path.basename}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: git@github.com:Aishwaryaa12/gke-argocd.git
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path[3]}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
