apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: immich-databases
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Aishwaryaa12/immich-gitops.git
    targetRevision: HEAD
    path: immich
  destination:
    server: https://kubernetes.default.svc
    namespace: immich
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
